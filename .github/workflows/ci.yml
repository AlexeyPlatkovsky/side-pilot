name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".beads/**"
      - ".claude/**"
      - ".manifesto/**"
      - "docs/**"
      - "*.md"
  push:
    paths-ignore:
      - "**/*.md"
      - ".beads/**"
      - ".claude/**"
      - ".manifesto/**"
      - "docs/**"
      - "*.md"

jobs:
  # Validate Rust core compiles, tests pass, and clippy is clean on target
  # desktop platforms (macOS, Windows) — the main `checks` job only runs on
  # Linux and would miss macOS-only code paths and Windows-sys code paths.
  rust-cross:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Test Rust core
        run: cargo nextest run --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust core
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Record pipeline start time
        run: echo "PIPELINE_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        id: npm-audit
        if: ${{ !cancelled() }}
        run: |
          EXIT_CODE=0
          npm audit --production --audit-level=high 2>&1 | tee /tmp/audit-fe.txt || EXIT_CODE=$?
          COUNT=$(grep -oP 'found \K\d+' /tmp/audit-fe.txt | tail -1)
          if [ -n "$COUNT" ] && [ "$COUNT" -eq 0 ] 2>/dev/null; then
            echo "report=clean" >> $GITHUB_OUTPUT
          elif [ -n "$COUNT" ]; then
            echo "report=$COUNT vulnerabilities" >> $GITHUB_OUTPUT
          fi
          exit $EXIT_CODE

      - name: Lint frontend
        id: lint
        if: ${{ !cancelled() }}
        run: npm run lint

      - name: Check formatting
        id: format
        if: ${{ !cancelled() }}
        run: npm run format:check

      - name: Smoke test frontend
        id: smoke-fe
        if: ${{ !cancelled() }}
        run: |
          EXIT_CODE=0
          npm run test:smoke -- --reporter=json 2>&1 | tee /tmp/smoke-fe.txt || EXIT_CODE=$?
          node -e "
          const f=require('fs').readFileSync('/tmp/smoke-fe.txt','utf8');
          const i=f.lastIndexOf('{'),j=i>=0?f.lastIndexOf('}'):-1;
          if(i>=0&&j>i) try {
            const r=JSON.parse(f.slice(i,j+1));
            if(typeof r.numTotalTests==='number')
              require('fs').appendFileSync(process.env.GITHUB_OUTPUT,'report='+r.numPassedTests+'/'+r.numTotalTests+' passed\n');
          } catch(e){}
          " 2>/dev/null || true
          exit $EXIT_CODE

      - name: Test frontend
        id: test-fe
        if: ${{ !cancelled() }}
        run: |
          EXIT_CODE=0
          npm run test -- --reporter=json 2>&1 | tee /tmp/test-fe.txt || EXIT_CODE=$?
          node -e "
          const f=require('fs').readFileSync('/tmp/test-fe.txt','utf8');
          const i=f.lastIndexOf('{'),j=i>=0?f.lastIndexOf('}'):-1;
          if(i>=0&&j>i) try {
            const r=JSON.parse(f.slice(i,j+1));
            if(typeof r.numTotalTests==='number')
              require('fs').appendFileSync(process.env.GITHUB_OUTPUT,'report='+r.numPassedTests+'/'+r.numTotalTests+' passed\n');
          } catch(e){}
          " 2>/dev/null || true
          exit $EXIT_CODE

      - name: Coverage frontend
        id: coverage
        if: ${{ !cancelled() }}
        run: |
          EXIT_CODE=0
          npm run test:coverage -- --reporter=json 2>&1 | tee /tmp/coverage.txt || EXIT_CODE=$?
          node -e "
          const f=require('fs').readFileSync('/tmp/coverage.txt','utf8');
          const i=f.lastIndexOf('{'),j=i>=0?f.lastIndexOf('}'):-1;
          if(i>=0&&j>i) try {
            const r=JSON.parse(f.slice(i,j+1));
            if(typeof r.numTotalTests==='number')
              require('fs').appendFileSync(process.env.GITHUB_OUTPUT,'report='+r.numPassedTests+'/'+r.numTotalTests+' passed\n');
          } catch(e){}
          " 2>/dev/null || true
          exit $EXIT_CODE

      - name: Install Playwright browsers
        if: ${{ !cancelled() }}
        run: npx playwright install --with-deps webkit chromium

      - name: Smoke test WebKit E2E
        id: smoke-e2e
        if: ${{ !cancelled() }}
        run: |
          EXIT_CODE=0
          npm run test:e2e:smoke -- --reporter=json 2>&1 | tee /tmp/smoke-e2e.txt || EXIT_CODE=$?
          node -e "
          const f=require('fs').readFileSync('/tmp/smoke-e2e.txt','utf8');
          const i=f.lastIndexOf('{'),j=i>=0?f.lastIndexOf('}'):-1;
          if(i>=0&&j>i) try {
            const r=JSON.parse(f.slice(i,j+1));
            if(r.stats)
              require('fs').appendFileSync(process.env.GITHUB_OUTPUT,'report='+r.stats.expected+'/'+r.stats.total+' passed\n');
          } catch(e){}
          " 2>/dev/null || true
          exit $EXIT_CODE

      - name: Test WebKit runtime harness
        id: e2e
        if: ${{ !cancelled() }}
        run: |
          EXIT_CODE=0
          npm run test:e2e -- --reporter=json 2>&1 | tee /tmp/e2e.txt || EXIT_CODE=$?
          node -e "
          const f=require('fs').readFileSync('/tmp/e2e.txt','utf8');
          const i=f.lastIndexOf('{'),j=i>=0?f.lastIndexOf('}'):-1;
          if(i>=0&&j>i) try {
            const r=JSON.parse(f.slice(i,j+1));
            if(r.stats)
              require('fs').appendFileSync(process.env.GITHUB_OUTPUT,'report='+r.stats.expected+'/'+r.stats.total+' passed\n');
          } catch(e){}
          " 2>/dev/null || true
          exit $EXIT_CODE

      - name: Build frontend
        id: build-fe
        if: ${{ !cancelled() }}
        run: npm run build

      - name: Test Rust core
        id: test-rust
        if: ${{ !cancelled() }}
        run: |
          EXIT_CODE=0
          cargo nextest run --manifest-path src-tauri/Cargo.toml 2>&1 | tee /tmp/test-rust.txt || EXIT_CODE=$?
          REPORT=$(grep -oP '\d+ tests run: \d+ passed, \d+ failed' /tmp/test-rust.txt | tail -1)
          [ -n "$REPORT" ] && echo "report=$REPORT" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Check IPC bindings are up to date
        id: ipc
        if: ${{ !cancelled() }}
        run: |
          EXIT_CODE=0
          cargo test --manifest-path src-tauri/Cargo.toml export_bindings 2>&1 | tee /tmp/ipc.txt || EXIT_CODE=$?
          git diff --exit-code src/chat/generated 2>&1 | tee -a /tmp/ipc.txt || EXIT_CODE=$?
          exit $EXIT_CODE

      - name: Lint Rust core
        id: clippy
        if: ${{ !cancelled() }}
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Audit Rust dependencies
        id: cargo-audit
        if: ${{ !cancelled() }}
        run: |
          EXIT_CODE=0
          cargo audit 2>&1 | tee /tmp/cargo-audit.txt || EXIT_CODE=$?
          if grep -q 'No vulnerabilities found' /tmp/cargo-audit.txt; then
            echo "report=clean" >> $GITHUB_OUTPUT
          else
            COUNT=$(grep -oP '\d+ vulnerabilities?' /tmp/cargo-audit.txt | tail -1)
            [ -n "$COUNT" ] && echo "report=$COUNT found" >> $GITHUB_OUTPUT
          fi
          exit $EXIT_CODE

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          LINT: ${{ steps.lint.outcome }}
          FORMAT: ${{ steps.format.outcome }}
          SMOKE_FE: ${{ steps.smoke-fe.outcome }}
          NPM_AUDIT: ${{ steps.npm-audit.outcome }}
          TEST_FE: ${{ steps.test-fe.outcome }}
          COVERAGE: ${{ steps.coverage.outcome }}
          SMOKE_E2E: ${{ steps.smoke-e2e.outcome }}
          E2E: ${{ steps.e2e.outcome }}
          BUILD_FE: ${{ steps.build-fe.outcome }}
          TEST_RUST: ${{ steps.test-rust.outcome }}
          IPC: ${{ steps.ipc.outcome }}
          CLIPPY: ${{ steps.clippy.outcome }}
          CARGO_AUDIT: ${{ steps.cargo-audit.outcome }}
          NPM_AUDIT_REPORT: ${{ steps.npm-audit.outputs.report }}
          SMOKE_FE_REPORT: ${{ steps.smoke-fe.outputs.report }}
          TEST_FE_REPORT: ${{ steps.test-fe.outputs.report }}
          COVERAGE_REPORT: ${{ steps.coverage.outputs.report }}
          SMOKE_E2E_REPORT: ${{ steps.smoke-e2e.outputs.report }}
          E2E_REPORT: ${{ steps.e2e.outputs.report }}
          TEST_RUST_REPORT: ${{ steps.test-rust.outputs.report }}
          CARGO_AUDIT_REPORT: ${{ steps.cargo-audit.outputs.report }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          now=$(date -u +"%Y-%m-%d %H:%M UTC")

          el=$(($(date +%s) - PIPELINE_START))
          elapsed="$((el / 60))m $((el % 60))s"

          short() {
            case "$1" in
              success) echo -n "ok" ;;
              failure) echo -n "fail" ;;
              skipped) echo -n "skip" ;;
              cancelled) echo -n "cancel" ;;
              *) echo -n "$1" ;;
            esac
          }

          report_or_short() {
            if [ -n "$2" ]; then
              echo -n "$2"
            else
              short "$1"
            fi
          }

          icon() {
            case "$1" in
              success) echo -n "✅" ;;
              skipped) echo -n "➖" ;;
              failure) echo -n "❌" ;;
              cancelled) echo -n "🚫" ;;
              *) echo -n "❓" ;;
            esac
          }

          table="| | Check | Result |
          |---|---|---|
           | $(icon "$LINT")     | Lint frontend   | $(report_or_short "$LINT" "")            |
           | $(icon "$FORMAT")   | Check formatting | $(report_or_short "$FORMAT" "")          |
           | $(icon "$SMOKE_FE") | Smoke test (FE)  | $(report_or_short "$SMOKE_FE" "$SMOKE_FE_REPORT") |
           | $(icon "$NPM_AUDIT")| Audit npm deps   | $(report_or_short "$NPM_AUDIT" "$NPM_AUDIT_REPORT") |
           | $(icon "$TEST_FE")  | Test frontend   | $(report_or_short "$TEST_FE" "$TEST_FE_REPORT")  |
           | $(icon "$COVERAGE") | Coverage frontend| $(report_or_short "$COVERAGE" "$COVERAGE_REPORT") |
           | $(icon "$SMOKE_E2E")| Smoke test (E2E) | $(report_or_short "$SMOKE_E2E" "$SMOKE_E2E_REPORT") |
           | $(icon "$E2E")      | WebKit E2E      | $(report_or_short "$E2E" "$E2E_REPORT")      |
           | $(icon "$BUILD_FE") | Build frontend  | $(report_or_short "$BUILD_FE" "")          |
           | $(icon "$TEST_RUST")| Test Rust core  | $(report_or_short "$TEST_RUST" "$TEST_RUST_REPORT")|
           | $(icon "$IPC")      | IPC bindings    | $(report_or_short "$IPC" "")              |
           | $(icon "$CLIPPY")   | Clippy (Rust lint)| $(report_or_short "$CLIPPY" "")          |
           | $(icon "$CARGO_AUDIT")| Audit Rust deps | $(report_or_short "$CARGO_AUDIT" "$CARGO_AUDIT_REPORT") |

          pass=$(echo "$table" | grep -cE "✅|➖" || true)
          fail=$(echo "$table" | grep -cE "❌|🚫|❓" || true)
          total=$((pass+fail))
          summary="$pass / $total passed"
          [ "$fail" -gt 0 ] && summary="$summary, $fail failed"

          body=$(printf "## CI — %s\n⏱ %s\n\n%s\n\n**%s**" "$now" "$elapsed" "$table" "$summary")

          # Remove previous CI comments by this bot to avoid duplicates.
          gh pr view "$PR" --repo "${{ github.repository }}" --json comments \
            -q '.comments[] | select(.author.login == "github-actions[bot]") | select(.body | startswith("## CI")) | .id' \
            | while read -r id; do
                gh api --silent -X DELETE "/repos/${{ github.repository }}/issues/comments/$id" || true
              done || true

          gh pr comment "$PR" --repo "${{ github.repository }}" --body "$body"
